name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: readme-cards
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p profile
          current_year="$(date -u +%Y)"

          curl --fail-with-body --silent --show-error --location \
            --retry 3 --retry-delay 3 \
            --header "User-Agent: Rafaellaerin-profile-workflow" \
            --output profile/stats.svg \
            "https://github-stats-extended.vercel.app/api?username=Rafaellaerin&show_icons=true&theme=github_dark&locale=pt-br&commits_year=${current_year}"

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=github_dark&layout=compact&langs_count=8&card_width=320&locale=pt-br
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate generated cards
        shell: bash
        run: |
          set -euo pipefail

          for card in profile/stats.svg profile/top-langs.svg; do
            test -s "$card" || {
              echo "::error file=$card::The generated card is empty or missing."
              exit 1
            }

            if grep -Eqi 'Something went wrong|Resource not accessible|data-testid="message"|<!DOCTYPE html>' "$card"; then
              echo "::error file=$card::The generated card contains an API error and will not be committed."
              exit 1
            fi
          done

      - name: Commit cards
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "Cards are already up to date."
            exit 0
          fi

          git commit -m "Update README cards"
          git push
