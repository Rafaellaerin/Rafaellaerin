name: Update README cards

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/grs.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/grs.yml
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: readme-cards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=github_dark&locale=pt-br
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=github_dark&layout=compact&langs_count=8&card_width=320&locale=pt-br
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Diagnose generated cards
        shell: bash
        run: |
          set -u
          for card in profile/stats.svg profile/top-langs.svg; do
            if test ! -s "$card"; then
              echo "::warning file=$card::The generated card is empty or missing."
            elif grep -Eqi 'Something went wrong|Resource not accessible|data-testid="message"' "$card"; then
              echo "::warning file=$card::The generated card contains an API error."
            else
              echo "$card is valid."
            fi
          done

      - name: Upload generated cards
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readme-cards
          path: |
            profile/stats.svg
            profile/top-langs.svg
          if-no-files-found: error

      - name: Commit cards
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "Cards are already up to date."
            exit 0
          fi

          git commit -m "Update README cards"
          git push
